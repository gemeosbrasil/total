	<script>
		$(function() {
			// Click a quantity option → select it (highlight + check radio) + update checkout link
			$('.quantity .option').on('click', function() {
				$('.quantity .option').removeClass('active');
				$(this).addClass('active');
				var $radio = $(this).find('input[type=radio]');
				$radio.prop('checked', true);

				// Update image
				var img = $radio.data('img');
				if (img) {
					$('.quantity .col.img img').not('.guarantee-overlay').hide();
					$('.quantity .col.img img.' + img).show();
				}

				// Update checkout link href to match selected quantity
				var link = $radio.data('link');
				if (link) {
					$('#checkout-link').attr('href', link);
				}
			});

			// Sync image + checkout link on page load
			(function syncStep1State() {
				var $sel = $('.quantity input[name=product-option]:checked');
				if (!$sel.length) return;
				var img = $sel.data('img');
				var $imgs = $('.quantity .col.img img').not('.guarantee-overlay');
				$imgs.hide();
				$('.quantity .col.img img.' + img).show();

				var link = $sel.data('link');
				if (link) {
					$('#checkout-link').attr('href', link);
				}
			})();
		});
	</script>
